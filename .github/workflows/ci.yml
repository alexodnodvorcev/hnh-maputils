name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up environment
      run: |
        # Установка необходимых пакетов
        # sudo apt-get update
        # sudo apt-get install -y pytest
    
    - name: Run tests
      run: make test